name: quant-awq
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  # 源码复现：autoawq 本体走 `pip install -e third_party/AutoAWQ[kernels,eval]`，
  # 不在 env.yml 里装 autoawq 任何 pip wheel。这里只装编译/驱动底座 + 通用依赖。
  - python=3.10
  - pip
  - pytorch=2.4.*           # AutoAWQ 末次官测 torch 2.6（已废弃）；2.4 兼容 autoawq-kernels prebuilt
  - pytorch-cuda=12.1       # CUDA ≥11.8 是 AutoAWQ 硬要求
  - pip:
    - sentencepiece         # LLaMA tokenizer 强依赖
    # 其它依赖：autoawq setup.py 的 install_requires + extras [kernels,eval] 都会自动装
    # （torch / triton / transformers>=4.45 / accelerate / datasets>=2.20 / autoawq-kernels /
    #  flash-attn>=2.2 / lm_eval==0.4.1 / tabulate / protobuf / evaluate / scipy / ...）
