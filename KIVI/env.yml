name: quant-kivi
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  # KIVI 是 runtime KV-cache 量化（不是 PTQ 权重量化），上游 pyproject.toml 锁定
  # torch 2.4.1 + transformers 4.43.1 这个相对新的 stack。我们用 conda 装 torch
  # + cu121 wheel，然后从 third_party/KIVI/ 用 `pip install -e .` 拉完上游 deps
  # （含 flash-attn 编译，5-15 min），再 `cd quant && pip install -e .` 编自家
  # kivi_gemv CUDA kernel。
  - python=3.10
  - pip
  - pytorch=2.4.*           # KIVI pyproject 锁 torch 2.4.1；2.4 是 cu121 wheel 最后支持版本
  - pytorch-cuda=12.1
  - pip:
    # 这里只放 KIVI pyproject 没 cover 但服务器/编译会用到的
    - numpy                 # KIVI pyproject 没列；torch 内部 import numpy，缺会让 flash-attn build 时报 warning 进而很多间接问题
    - sentencepiece
    - protobuf              # LlamaTokenizer slow tokenizer 解析 sentencepiece 用
    - packaging             # flash-attn 编译时 setup.py 要 parse
    - ninja                 # flash-attn / kivi_gemv 编译加速
    - 'datasets<3.0'        # 必须 <3。datasets 3.0+ 砍掉了 script-based dataset 支持；THUDM/LongBench 还是老式（有 LongBench.py 加载器），用新 datasets 会 RuntimeError: Dataset scripts are no longer supported
    # LongBench 评分依赖（KIVI 上游 pyproject.toml 漏列；eval_long_bench.py → metrics.py 用）
    - jieba                 # 中文 tokenization，给 dureader/multifieldqa_zh/vcsum 中文 task 用
    - rouge                 # ROUGE-1/2/L，给 summarization task 用。注意是 `rouge` 不是 `rouge_score`——两个不同 PyPI 包，KIVI metrics.py 用 `from rouge import Rouge`
    - fuzzywuzzy            # 模糊匹配，给 QA exact-match-ish scoring 用
    - python-Levenshtein    # fuzzywuzzy 的 C 加速后端（可选，不装也能跑但 warning）
    # 其它（transformers / accelerate / datasets / flash-attn / fastchat / ...）
    # 走 §3 的 `pip install -e third_party/KIVI`，由 KIVI 的 pyproject.toml 拉齐
