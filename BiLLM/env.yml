name: quant-billm
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  # 源码复现：BiLLM 上游是一份 research script repo（没有 setup.py），
  # 直接 clone 进 third_party/BiLLM/ 然后用脚本跑。requirements 走 pip
  # （上游 requirements.txt 列了 transformers/datasets/numpy 的硬版本锁）。
  - python=3.10
  - pip
  - pytorch=2.1.*           # paper 用 torch 2.0.1+cu117；2.1 兼容 transformers 4.35 + cu12.x 驱动
  - pytorch-cuda=12.1       # 服务器 driver 12.4 / nvcc 12.0；cu121 wheel 原生匹配
  - pip:
    # 上游 requirements.txt 锁定的版本（不要漂移，4.35 之外的 transformers 加载脚本会改行为）
    - transformers==4.35.0
    - datasets==2.14.6
    - 'pyarrow<15'         # datasets 2.14.6 用 pa.PyExtensionType；pyarrow 15+ 删了这个 API，会 AttributeError
    - numpy==1.24.3
    - exceptiongroup       # 上游 bigptq.py 引；requirements.txt 漏了
    - pyparsing            # 上游 utils/autosearch.py 引；requirements.txt 漏了
    - protobuf             # LlamaTokenizer(use_fast=False) 解析 sentencepiece 需要
    - sentencepiece         # LLaMA tokenizer 强依赖
    - accelerate==0.25.0    # 必须钉。0.30+ 引入 split_torch_state_dict_into_shards，需要 huggingface_hub>=0.23；与 transformers 4.35 时代的 hub 0.17 冲突
    - huggingface-hub>=0.16.4
    - safetensors
